version: '3.8'

services:
  # ---------------------------------------------------------
  # PostgreSQL Database Service
  # ---------------------------------------------------------
  postgres:
    image: postgres:15-alpine
    container_name: harvestshield-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-harvestshield_db}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - harvestshield_net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d harvestshield_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  # ---------------------------------------------------------
  # pgAdmin Service (Database GUI)
  # ---------------------------------------------------------
  pgadmin:
    image: dpage/pgadmin4
    container_name: harvestshield-pgadmin
    restart: unless-stopped
    environment:
      PGADMIN_DEFAULT_EMAIL: ${PGADMIN_DEFAULT_EMAIL:-admin@harvestshield.ai}
      PGADMIN_DEFAULT_PASSWORD: ${PGADMIN_DEFAULT_PASSWORD:-admin123}
      PGADMIN_CONFIG_SERVER_MODE: 'False'
    ports:
      - "5050:80"
    volumes:
      - pgadmin_data:/var/lib/pgadmin
      - ./pgadmin-servers.json:/pgadmin4/servers.json
    networks:
      - harvestshield_net
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------
  # Node.js API Service
  # ---------------------------------------------------------
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: harvestshield-api
    restart: unless-stopped
    environment:
      - NODE_ENV=development
      - PORT=5000
      # Using the internal Docker network to connect to postgres
      - DATABASE_URL=postgresql://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-harvestshield_db}?schema=public
      - JWT_SECRET=${JWT_SECRET:-harvestshield-dev-secret-change-in-production-2024}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-7d}
    ports:
      - "5000:5000"
    volumes:
      - .:/usr/src/app
      - /usr/src/app/node_modules
    networks:
      - harvestshield_net
    depends_on:
      postgres:
        condition: service_healthy

  # ---------------------------------------------------------
  # Python AI Intelligence Microservice
  # ---------------------------------------------------------
  ai-service:
    build:
      context: ./ai-service
      dockerfile: Dockerfile
    container_name: harvestshield-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    networks:
      - harvestshield_net

  # ---------------------------------------------------------
  # Redis (Future Compatibility)
  # ---------------------------------------------------------
  # redis:
  #   image: redis:7-alpine
  #   container_name: harvestshield-redis
  #   restart: unless-stopped
  #   ports:
  #     - "6379:6379"
  #   networks:
  #     - harvestshield_net

volumes:
  postgres_data:
  pgadmin_data:

networks:
  harvestshield_net:
    driver: bridge
